name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build server
        run: cargo build --release --target ${{ matrix.target }} -p agentim-server

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p agentim-cli

      - name: Package server
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../agentim-server-${{ matrix.platform }}.tar.gz agentim-server
          cd ../../..

      - name: Package CLI
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../agentim-cli-${{ matrix.platform }}.tar.gz agentim
          cd ../../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            agentim-server-${{ matrix.platform }}.tar.gz
            agentim-cli-${{ matrix.platform }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz

  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare Docker contexts
        run: |
          mkdir -p docker-amd64 docker-arm64
          tar -xzf artifacts/agentim-server-linux-amd64.tar.gz -C docker-amd64
          tar -xzf artifacts/agentim-server-linux-arm64.tar.gz -C docker-arm64
          cp Dockerfile docker-amd64/
          cp Dockerfile docker-arm64/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: docker-amd64
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.owner }}/agentim-server:${{ steps.meta.outputs.version }}-amd64

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: docker-arm64
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.owner }}/agentim-server:${{ steps.meta.outputs.version }}-arm64

      - name: Create multi-arch manifest
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          IMAGE="ghcr.io/${{ steps.meta.outputs.owner }}/agentim-server"

          docker buildx imagetools create -t "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

          docker buildx imagetools create -t "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
